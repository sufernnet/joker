name: 自动生成 new.m3u

on:
  workflow_dispatch:

  schedule:
    - cron: '0 22 * * *'
    - cron: '0 9 * * *'

  push:
    paths:
      - 'scripts/new.py'
      - '.github/workflows/new.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: |
          python -V
          pip install requests aiohttp

      - name: 🚀 运行脚本
        run: |
          python scripts/new.py

      - name: 🔍 检查输出文件
        run: |
          echo "===== 当前目录 ====="
          pwd
          echo "===== 仓库根目录文件 ====="
          ls -la
          echo "===== scripts 目录 ====="
          ls -la scripts || true
          echo "===== 查找 new.m3u ====="
          find . -name "new.m3u" -type f || true
          echo "===== 文件预览 ====="
          head -n 30 new.m3u || true

      - name: 📦 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: new-m3u
          path: new.m3u
          if-no-files-found: warn

      - name: 📤 提交更新
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          if [ ! -f new.m3u ]; then
            echo "未找到 new.m3u，退出"
            exit 1
          fi

          git add new.m3u

          if git diff --cached --quiet; then
            echo "无变化"
          else
            git commit -m "🤖 自动更新 new.m3u"
            git push origin ${{ github.ref_name }}
          fi
