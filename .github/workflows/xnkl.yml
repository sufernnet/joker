name: 自动生成xnkl.m3u（直播源分类）

on:
  # 手动触发
  workflow_dispatch:
  
  # 定时触发：北京时间 06:00 和 17:00
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = 北京时间 06:00（次日）
    - cron: '0 9 * * *'   # UTC 09:00 = 北京时间 17:00
  
  # 当脚本更新时也触发
  push:
    paths:
      - 'scripts/xnkl.py'
      - '.github/workflows/xnkl.yml'

jobs:
  generate-xnkl:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./  # 在仓库根目录运行
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: 🐍 设置Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: 📦 安装依赖
      run: pip install requests
    
    - name: 🚀 运行xnkl生成脚本
      run: |
        echo "开始生成xnkl.m3u..."
        python scripts/xnkl.py
        
        echo -e "\n=== 检查生成的文件 ==="
        if [ -f "xnkl.m3u" ]; then
          echo "✅ xnkl.m3u 已生成在仓库根目录"
          echo "文件大小: $(wc -c < xnkl.m3u) 字节"
          echo "行数: $(wc -l < xnkl.m3u)"
          
          echo -e "\n=== 文件内容预览 ==="
          echo "前10行:"
          head -10 xnkl.m3u
          echo "..."
          
          echo -e "\n=== 分类统计 ==="
          echo "各分类频道数:"
          grep "group-title=" xnkl.m3u | sed 's/.*group-title="\([^"]*\)".*/\1/' | sort | uniq -c | sort -nr
        else
          echo "❌ xnkl.m3u 未生成"
          echo "当前目录内容:"
          ls -la
          echo -e "\nscripts目录内容:"
          ls -la scripts/ || echo "scripts目录不存在"
          exit 1
        fi
    
    - name: 🔄 同步远程更改
      run: |
        echo "同步远程仓库..."
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        
        git pull origin main --rebase --autostash || echo "拉取失败，继续"
        echo "✅ 同步完成"
    
    - name: 📤 提交更新
      run: |
        echo "准备提交xnkl.m3u..."
        
        if [ ! -f "xnkl.m3u" ]; then
          echo "❌ xnkl.m3u不存在"
          exit 1
        fi
        
        git add xnkl.m3u
        
        if git diff --cached --quiet; then
          echo "📭 文件无变化，无需提交"
        else
          git commit -m "🤖 自动更新 xnkl.m3u [$(date +'%Y-%m-%d %H:%M')]"
          echo "提交信息: $(git log -1 --oneline)"
          
          echo "推送更改..."
          max_retries=3
          for i in $(seq 1 $max_retries); do
            echo "尝试推送 (第 $i 次)..."
            if git push origin main; then
              echo "✅ 推送成功"
              break
            else
              echo "推送失败，等待重试..."
              sleep 5
              git pull origin main --rebase
            fi
          done
        fi
    
    - name: 📊 输出结果
      run: |
        echo "=== 运行完成 ==="
        echo "时间: $(date)"
        echo "文件: xnkl.m3u"
        echo "链接: https://raw.githubusercontent.com/${{ github.repository }}/main/xnkl.m3u"
        echo "下次运行: 北京时间 06:00 和 17:00"
        
        # 显示最终文件信息
        if [ -f "xnkl.m3u" ]; then
          echo -e "\n=== 最终文件信息 ==="
          echo "文件大小: $(wc -c < xnkl.m3u) 字节"
          echo "总行数: $(wc -l < xnkl.m3u)"
          CHANNEL_COUNT=$(grep -c "^#EXTINF" xnkl.m3u)
          echo "频道数: $CHANNEL_COUNT"
          
          # 输出分类统计到日志
          echo -e "\n=== 分类详情 ==="
          grep "group-title=" xnkl.m3u | sed 's/.*group-title="\([^"]*\)".*/\1/' | sort | uniq -c | while read count cat; do
            echo "  $cat: $count"
          done
        fi
