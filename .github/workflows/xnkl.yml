name: 自动生成 xnkl.m3u（直播源分类）

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'  # 北京时间 06:00
    - cron: '0 9 * * *'   # 北京时间 17:00
  push:
    paths:
      - 'scripts/xnkl.py'
      - '.github/workflows/xnkl.yml'

jobs:
  generate-xnkl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: 🚀 运行 xnkl.py
        run: python scripts/xnkl.py
      
      - name: 📤 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xnkl.m3u
          if ! git diff --cached --quiet; then
            git commit -m "🤖 自动更新 xnkl.m3u [$(date +'%Y-%m-%d %H:%M')]"
            git push
          fi
