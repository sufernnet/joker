name: 自动生成Gather.m3u

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'  # 北京时间 06:00
    - cron: '0 9 * * *'   # 北京时间 17:00
  push:
    paths:
      - 'scripts/merge_ff.py'
      - '.github/workflows/merge-ff.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: 🐍 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: 📦 安装依赖
      run: pip install requests
    
    - name: 🚀 运行脚本
      run: |
        # 确保脚本有执行权限并指向正确路径
        python scripts/merge_ff.py
        
    - name: 📤 提交更新
      run: |
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        
        git add Gather.m3u
        
        if git diff --cached --quiet; then
          echo "文件无变化，跳过提交"
        else
          git commit -m "🤖 自动更新 Gather.m3u [$(date +'%Y-%m-%d %H:%M')]"
          git push origin main
        fi
