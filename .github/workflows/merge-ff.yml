name: 自动生成 Gather.m3u

on:
  workflow_dispatch:

  schedule:
    - cron: '0 22 * * *'
    - cron: '0 9 * * *'

  push:
    paths:
      - 'scripts/merge_ff.py'
      - '.github/workflows/merge-ff.yml'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v3

    - name: 🐍 设置Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 📦 安装依赖
      run: pip install requests

    - name: 🚀 运行脚本
      run: |
        python scripts/merge_ff.py

    - name: 📤 提交更新
      run: |
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"

        git add Gather.m3u

        if git diff --cached --quiet; then
          echo "无变化"
        else
          git commit -m "🤖 自动更新 Gather.m3u"
          git push
        fi
