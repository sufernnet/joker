name: 自动生成 Gather.m3u

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 22 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v3

    - name: 🐍 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 📦 安装依赖
      run: pip install requests

    - name: 🚀 运行脚本
      run: python scripts/merge_ff.py

    - name: 📤 提交更新（防冲突版）
      run: |
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"

        git add Gather.m3u

        git diff --cached --quiet && echo "无变化" && exit 0

        git commit -m "🤖 自动更新 Gather.m3u"

        git pull --rebase origin main || exit 0

        git push || exit 0
