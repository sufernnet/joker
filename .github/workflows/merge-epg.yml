name: 合并EPG节目源

on:
  schedule:
    # 每天凌晨2点运行 (UTC时间)，对应北京时间上午10点
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    paths:
      - 'merge_epg.py'  # 当脚本更新时也运行

jobs:
  merge-epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许写入仓库
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: 运行合并脚本
        run: |
          echo "开始合并EPG源..."
          python merge_epg.py
          echo "合并完成"
      
      - name: 检查文件变化
        id: check_changes
        run: |
          if [ -f epg.xml.gz ]; then
            echo "epg.xml.gz 已生成"
            # 检查是否有变化
            git add epg.xml.gz -n
            if git diff --cached --quiet; then
              echo "文件无变化，跳过提交"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            else
              echo "文件有变化，准备提交"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "文件未生成"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 提交更新
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add epg.xml.gz
          git commit -m "自动更新EPG数据 - $(date '+%Y-%m-%d %H:%M:%S')"
          git push
