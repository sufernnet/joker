name: 部署4GTV直播源

on:
  push:
    branches: [ main, master ]
    paths:
      - '4gtv-list.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
      
      - name: 创建配置目录
        run: |
          mkdir -p output
      
      - name: 复制JS文件
        run: |
          cp 4gtv-list.js output/
          echo "✅ JS文件已复制"
      
      - name: 创建README说明
        run: |
          cat > output/README.md << 'EOF'
          # 4GTV 直播源
          
          ## 📺 TVBox 配置地址
          ```
          https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/4gtv-list.js
          ```
          
          ## 🔧 使用方法
          
          ### 在TVBox类应用中使用：
          1. 打开TVBox设置
          2. 在"配置地址"中输入上面的链接
          3. 确定加载即可
          
          ### 支持的源地址：
          ```
          https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/4gtv-list.js
          ```
          
          ### 使用代理加速（如果直接访问慢）：
          ```
          https://ghproxy.com/https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/main/4gtv-list.js
          ```
          
          ## ⏰ 更新信息
          - 最后更新: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          - 文件: 4gtv-list.js
          
          ## ⚠️ 说明
          本仓库仅用于技术学习交流，所有内容均来自互联网。
          EOF
      
      - name: 部署到GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: |
            deploy 4gtv-list.js
            🕒 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
