name: 更新4GTV直播源

on:
  # 定时触发：每天凌晨2点运行
  schedule:
    - cron: '0 2 * * *'
  
  # 手动触发：可以在GitHub Actions页面手动运行
  workflow_dispatch:
  
  # 代码推送时触发（可选）
  push:
    branches: [ main ]
    paths:
      - 'scripts/4gtv.py'

jobs:
  update-m3u:
    name: 生成M3U文件
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: 检出仓库
        uses: actions/checkout@v3
      
      # 2. 设置Python环境（去掉缓存配置）
      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # 移除 cache 配置，或者改为：
          # cache: 'pip'
          # cache-dependency-path: 'scripts/requirements.txt'
      
      # 3. 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      # 4. 运行生成脚本
      - name: 运行4GTV生成器
        run: |
          python scripts/4gtv.py
        continue-on-error: false
      
      # 5. 准备文件列表
      - name: 列出生成的文件
        run: |
          ls -la output/
          echo "文件大小:"
          wc -l output/4gtv.m3u || echo "文件不存在"
      
      # 6. 部署到GitHub Pages分支
      - name: 部署到gh-pages分支
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          destination_dir: ./
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '更新4GTV直播源 - ${{ github.event.head_commit.message }}'
