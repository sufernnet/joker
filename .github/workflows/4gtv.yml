name: 更新4GTV直播源

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'scripts/4gtv.py'
      - '.github/workflows/4gtv.yml'

jobs:
  update-m3u:
    name: 生成M3U文件
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: 运行4GTV生成器
        run: |
          python scripts/4gtv.py
      
      - name: 检查生成的文件
        run: |
          if [ -f "output/4gtv.m3u" ]; then
            echo "✅ M3U文件生成成功"
            CHANNEL_COUNT=$(grep -c ^#EXTINF output/4gtv.m3u || echo "0")
            echo "频道数量: $CHANNEL_COUNT"
            echo "CHANNEL_COUNT=$CHANNEL_COUNT" >> $GITHUB_ENV
          else
            echo "❌ M3U文件不存在"
            exit 1
          fi
      
      - name: 部署到GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: |
            update 4gtv.m3u
            📊 频道: ${{ env.CHANNEL_COUNT }}
