name: 自动生成 joker.m3u

on:
  workflow_dispatch:

  schedule:
    - cron: '0 22 * * *'
    - cron: '0 9 * * *'

  push:
    paths:
      - 'scripts/merge_ff.py'
      - '.github/workflows/merge-ff.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: 🐍 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: pip install requests aiohttp

      - name: 🚀 运行脚本
        run: |
          python scripts/merge_ff.py

      - name: 🔍 检查输出文件
        run: |
          pwd
          ls -la
          ls -la joker.m3u || true
          head -n 20 joker.m3u || true

      - name: 📤 提交更新
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add joker.m3u

          if git diff --cached --quiet; then
            echo "无变化"
          else
            git commit -m "🤖 自动更新 joker.m3u"
            git push origin ${{ github.ref_name }}
          fi
