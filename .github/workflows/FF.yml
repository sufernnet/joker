name: 自动生成FF.m3u（HK\TW\Sports）


on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'  # 北京时间 06:00
    - cron: '0 9 * * *'   # 北京时间 17:00
  push:
    paths:
      - 'scripts/FF.py'
      - '.github/workflows/FF.yml'

jobs:
  generate-ff:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v3
    
    - name: 🐍 设置Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: 📦 安装依赖
      run: pip install requests
    
    - name: 🚀 运行生成脚本
      run: python scripts/FF.py
    
    - name: 📤 提交更新
      run: |
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        git add FF.m3u
        if git diff --cached --quiet; then
          echo "无文件变化"
        else
          git commit -m "🤖 自动更新 FF.m3u [$(date +'%Y-%m-%d %H:%M')]"
          git push origin main
        fi
